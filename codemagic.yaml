workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.blackfabricsecurity.crossplatformblackfabric"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        APP_STORE_ID: 1234567890
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch signing files
        script: |
          echo "Fetching signing files..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates
        script: |
          keychain add-certificates

      - name: Configure push entitlements
        script: |
          cd ios

          gem install xcodeproj

          cat > configure_push.rb << 'RUBY_SCRIPT'
          require 'xcodeproj'

          project_path = 'Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          target = project.targets.first
          puts "Configuring target: #{target.name}"

          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'Runner/Runner.entitlements'
            config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
            config.build_settings['ENABLE_BITCODE'] = 'NO'
          end

          project.save
          puts 'Xcode project configured successfully'
          RUBY_SCRIPT

          ruby configure_push.rb

          if [ ! -f "Runner/Runner.entitlements" ]; then
            cat > Runner/Runner.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>aps-environment</key>
          <string>development</string>
          </dict>
          </plist>
          EOF
          fi

          cat Runner/Runner.entitlements
          grep "CODE_SIGN_ENTITLEMENTS" Runner.xcodeproj/project.pbxproj | head -3

          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Clean build
        script: |
          flutter clean
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          cd ..

      - name: Install CocoaPods
        script: |
          cd ios
          pod cache clean --all
          pod deintegrate || true
          pod install --repo-update
          cd ..

      - name: Build iOS app
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - admin@blackfabricsecurity.com
        notify:
          success: true
          failure: true

      app_store_connect:
        submit_to_testflight: true
