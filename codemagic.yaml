workflows:
  ios-testflight:
    name: BFS Guard Portal — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - guard_portal_credentials
      vars:
        BUNDLE_ID: "com.blackfabricsecurity.crossplatformblackfabric"
        APPLE_TEAM_ID: "XZSWQ5463A"
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch certificate from Apple
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          echo "=== Certificates fetched: ==="
          security find-identity -v -p codesigning

      - name: Add certificate to keychain
        script: |
          keychain add-certificates
          echo "=== Signing identities in keychain: ==="
          security find-identity -v -p codesigning

      - name: Install provisioning profile
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          printf '%s' "$GP_PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_DIR/bfs_guard.mobileprovision"
          echo "=== Installed profiles: ==="
          ls -1 "$PROFILES_DIR"

      - name: Configure Xcode signing
        script: |
          cd ios

          ruby - <<'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Runner.xcodeproj')
          project.targets.each do |target|
            next unless target.name == 'Runner'
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_STYLE']                = 'Manual'
              config.build_settings['CODE_SIGN_IDENTITY']             = 'Apple Distribution'
              config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'BlackFabric AppStore Push'
              config.build_settings['DEVELOPMENT_TEAM']               = 'XZSWQ5463A'
              config.build_settings['CODE_SIGN_ENTITLEMENTS']         = 'Runner/Runner.entitlements'
            end
          end
          project.save
          puts 'Xcode signing configured'
          RUBY

          if [ ! -f "Runner/Runner.entitlements" ]; then
            cat > Runner/Runner.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          EOF
          fi

          RELEASE_XCCONFIG="Flutter/Release.xcconfig"
          echo "" >> "$RELEASE_XCCONFIG"
          echo "CODE_SIGN_STYLE=Manual" >> "$RELEASE_XCCONFIG"
          echo "CODE_SIGN_IDENTITY=Apple Distribution" >> "$RELEASE_XCCONFIG"
          echo "PROVISIONING_PROFILE_SPECIFIER=BlackFabric AppStore Push" >> "$RELEASE_XCCONFIG"
          echo "DEVELOPMENT_TEAM=XZSWQ5463A" >> "$RELEASE_XCCONFIG"
          cd ..

      - name: Install Flutter packages
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>XZSWQ5463A</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.blackfabricsecurity.crossplatformblackfabric</key>
              <string>BlackFabric AppStore Push</string>
            </dict>
          </dict>
          </plist>
          PLIST

          flutter build ipa --release \
            --no-pub \
            --export-options-plist=/tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - admin@blackfabricsecurity.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
